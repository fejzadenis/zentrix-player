name: zentrix
description: Zentrix — A premium IPTV player application with Netflix-level UX.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3

  # Video Player (media_kit supports Windows, macOS, Linux, iOS, Android)
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # XML Parsing (for EPG)
  xml: ^6.5.0

  # File Handling
  file_picker: ^8.1.6
  path_provider: ^2.1.5

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1

  # Navigation
  go_router: ^14.8.1

  # Utilities
  intl: ^0.20.2
  wakelock_plus: ^1.2.8
  volume_controller: ^3.0.2
  screen_brightness: ^2.0.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1
  collection: ^1.18.0
  simple_pip_mode: ^1.1.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
